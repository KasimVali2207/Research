version: '3.9'
services:
  cancer-triage:
    build: ..
    volumes:
      - ../data:/workspace/data
      - ../results:/workspace/results
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    command: python src/run_pipeline.py experiment=baseline

  mlflow:
    image: python:3.11-slim
    command: mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri /mlflow
    ports:
      - "5000:5000"
    volumes:
      - ../results/mlflow:/mlflow
