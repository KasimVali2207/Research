defaults:
  - _self_

seed: 42

paths:
  data_raw_mimic: data/raw/mimic
  data_raw_eicu: data/raw/eicu
  data_processed: data/processed
  results: results
  models: results/models
  figures: results/figures
  mlflow_uri: results/mlflow

cohort:
  cancer_types:
    colorectal:
      icd_codes: ["C18", "C19", "C20"]
    lung:
      icd_codes: ["C33", "C34"]
    liver:
      icd_codes: ["C22"]
  prediction_horizons_months: [3, 6, 12]
  control_ratio: 3
  min_labs_before_diagnosis: 3
  min_days_of_history: 30

features:
  cbc: ["wbc", "rbc", "hemoglobin", "hematocrit", "mcv", "mch", "rdw", "platelets", "neutrophils", "lymphocytes", "monocytes"]
  metabolic: ["glucose", "albumin", "creatinine", "bun", "bilirubin", "alt", "ast", "alp", "sodium", "potassium", "total_protein"]
  inflammatory: ["crp", "esr", "ferritin"]
  derived: ["nlr", "plr", "sii"]
  temporal_stats: ["mean", "median", "std", "trend_slope", "delta", "velocity", "moving_avg", "exp_smooth"]

models:
  logistic_regression:
    C: 1.0
    max_iter: 1000
    class_weight: balanced
  random_forest:
    n_estimators: 500
    max_depth: 10
    class_weight: balanced
    n_jobs: -1
  xgboost:
    n_estimators: 500
    learning_rate: 0.05
    max_depth: 6
    scale_pos_weight: 3
    eval_metric: aucpr
  lightgbm:
    n_estimators: 500
    learning_rate: 0.05
    num_leaves: 63
    class_weight: balanced
  catboost:
    iterations: 500
    learning_rate: 0.05
    depth: 6
    auto_class_weights: Balanced
    verbose: 0
  tabnet:
    n_d: 64
    n_a: 64
    n_steps: 5
    max_epochs: 200
    patience: 20

evaluation:
  target_specificity: 0.85
  bootstrap_iterations: 1000
  calibration_bins: 10

agents:
  llm_model: "gpt-4o"
  temperature: 0.0
  max_tokens: 2000

retrieval:
  embedding_model: "NLP4Science/pubmedbert-base-embeddings"
  faiss_index_path: data/processed/faiss_index
  top_k: 5
  chunk_size: 512
  chunk_overlap: 50
