defaults:
  - base
  - _self_

experiment:
  name: ablation_study
  description: "Remove components one at a time to measure contribution"
  cancer_types: [colorectal, lung, liver]
  horizons: [12]
  ablations:
    - name: no_evidence_agent
      disable: [evidence_grounding_agent]
    - name: no_differential_agent
      disable: [differential_diagnosis_agent]
    - name: no_temporal
      use_temporal: false
    - name: no_rag
      use_rag: false
    - name: no_calibration
      use_calibration: false
